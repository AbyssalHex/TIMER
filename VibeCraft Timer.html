<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperless Trail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* --- Color Palette from your image --- */
        :root {
            --bg-light-gray: #D7D7D7;
            --dark-blue-gray: #4C5B6F;
            --vibrant-yellow: #F0CC0A;
            --vibrant-orange: #EB6B20;
            --aqua-teal: #49CEDC;
            --darkest-accent: #2A384A;
        }

        /* --- General Styling & New Background --- */
        body {
            background-color: black; /* CHANGED: Background is now black */
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--bg-light-gray);
            background-image: url(".\\SITE ON SIGHT.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        /* --- Main Timer Container (Now in a Dark Blue/Gray) --- */
        .minecraft-container {
            background-color: var(--dark-blue-gray);
            padding: 30px 40px;
            border: 8px solid var(--darkest-accent);
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(0,0,0,0.4);
            text-align: center;
            width: 90%;
            max-width: 750px;
        }

        /* --- VibeCraft Title Styling (Yellow with Darker Shadow) --- */
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--vibrant-yellow);
            text-shadow: 4px 4px 0px var(--darkest-accent);
        }

        /* --- Timer Display Styling (Darker Blue/Gray screen) --- */
        #timer-display {
            font-size: 3.5rem;
            background-color: var(--darkest-accent);
            padding: 20px 10px;
            margin: 20px 0;
            border: 6px solid var(--dark-blue-gray);
            box-shadow: inset 0 0 10px #000000;
            letter-spacing: 2px;
            color: var(--bg-light-gray);
            min-width: 250px;
        }

        /* --- Input Fields Styling --- */
        .time-inputs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .time-inputs input {
            width: 80px;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            text-align: center;
            background-color: var(--darkest-accent);
            border: 4px solid var(--dark-blue-gray);
            color: var(--bg-light-gray);
            -moz-appearance: textfield;
            appearance: textfield;
        }
        .time-inputs input::-webkit-outer-spin-button,
        .time-inputs input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* --- Control Buttons Styling (Aqua/Teal Buttons) --- */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .controls button {
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            padding: 15px 25px;
            cursor: pointer;
            color: var(--darkest-accent);
            background-color: var(--aqua-teal);
            border-style: solid;
            border-width: 4px;
            border-color: #79E8F5 #35A3AD #35A3AD #79E8F5;
            box-shadow: 2px 2px 0px var(--darkest-accent);
            transition: all 0.05s ease-in-out;
        }

        .controls button:active {
            border-color: #35A3AD #79E8F5 #79E8F5 #35A3AD;
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* --- Responsive Design for smaller screens --- */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }
            #timer-display {
                font-size: 2.5rem;
                min-width: unset;
            }
            .controls {
                flex-direction: column;
            }
            .minecraft-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="minecraft-container">
        <h1>Paperless Trail</h1>

        <div id="timer-display">00:00:00</div>

        <div class="time-inputs">
            <input type="number" id="hours" placeholder="HH" min="0" max="99">
            <input type="number" id="minutes" placeholder="MM" min="0" max="59">
            <input type="number" id="seconds" placeholder="SS" min="0" max="59">
        </div>

        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <audio id="end-sound" src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/gotitem.mp3" preload="auto"></audio>

    <script>
        // --- Get DOM Elements ---
        const timerDisplay = document.getElementById('timer-display');
        const hoursInput = document.getElementById('hours');
        const minutesInput = document.getElementById('minutes');
        const secondsInput = document.getElementById('seconds');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const endSound = document.getElementById('end-sound');

        // --- State Variables ---
        let timerInterval = null;
        let totalSeconds = 0;
        let isPaused = false;

        // --- Event Listeners ---
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        // --- Core Functions ---

        function startTimer() {
            if (timerInterval !== null && !isPaused) {
                return;
            }

            if (isPaused) {
                isPaused = false;
            } else {
                const hours = parseInt(hoursInput.value) || 0;
                const minutes = parseInt(minutesInput.value) || 0;
                const seconds = parseInt(secondsInput.value) || 0;
                totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
            }

            if (totalSeconds <= 0) {
                return;
            }
            
            clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    endSound.play();
                    alert("Time's up!");
                    resetTimer();
                    return;
                }
                totalSeconds--;
                updateDisplay();
            }, 1000);
        }

        function pauseTimer() {
            if (timerInterval !== null) {
                clearInterval(timerInterval);
                isPaused = true;
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            isPaused = false;
            totalSeconds = 0;
            updateDisplay();
            hoursInput.value = '';
            minutesInput.value = '';
            secondsInput.value = '';
        }

        function updateDisplay() {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            timerDisplay.textContent = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
        
        updateDisplay();
    </script>

</body>
</html>
