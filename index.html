<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperless Trail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="canvas">
    <div class="minecraft-container">
        <h1>Site On Sight</h1>

        <div id="timer-display">00:00:00</div>

        <div class="time-inputs">
            <input type="number" id="hours" placeholder="HH" min="0" max="99">
            <input type="number" id="minutes" placeholder="MM" min="0" max="59">
            <input type="number" id="seconds" placeholder="SS" min="0" max="59">
        </div>

        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
    <div class="sponsorship-container">
      <img src="crochet.png" alt="sponsor's pic">
      <span class="tagline">SPECIAL THANKS TO <br/> Coffee and Crochet <br/><br/> Please follow them on Instagram. </span>
      <img src="coffee.and._.crochet_qr.png" alt="sponsor's insta">
    </div>
  </div>
    <audio id="end-sound" src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/gotitem.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
